spring.application.name=ticketing
server.port=8081


# DataSource - PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/ticketing
spring.datasource.username=postgres
spring.datasource.password=Sachin29
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.show-sql=false

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# MongoDB
spring.data.mongodb.uri=mongodb://localhost:27017/ticketing


# RabbitMQ
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

# Swagger / OpenAPI
springdoc.api-docs.enabled=true
springdoc.swagger-ui.path=/swagger-ui
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha

# Security - JWT (Development HS256 example; move to RS256 for prod)
security.jwt.algorithm=HS256
security.jwt.secret=change-this-dev-secret-at-least-32-bytes
security.jwt.issuer=event-ticketing
security.jwt.access-token-ttl=15m
security.jwt.refresh-token-ttl=7d

# OAuth2 (Google) - placeholders; fill real values for login
spring.security.oauth2.client.registration.google.client-id=YOUR_GOOGLE_CLIENT_ID
spring.security.oauth2.client.registration.google.client-secret=YOUR_GOOGLE_CLIENT_SECRET
spring.security.oauth2.client.registration.google.scope=openid,profile,email
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/oauth2/callback/google
spring.security.oauth2.client.registration.google.client-name=Google
spring.security.oauth2.client.provider.google.authorization-uri=https://accounts.google.com/o/oauth2/v2/auth
spring.security.oauth2.client.provider.google.token-uri=https://oauth2.googleapis.com/token
spring.security.oauth2.client.provider.google.user-info-uri=https://www.googleapis.com/oauth2/v3/userinfo
spring.security.oauth2.client.provider.google.user-name-attribute=sub

# Caching (Caffeine) example
spring.cache.type=caffeine
spring.cache.caffeine.spec=maximumSize=10000,expireAfterWrite=120s

# Actuator exposure (adjust in prod)
management.endpoints.web.exposure.include=health,info,metrics,env,loggers,httpexchanges
management.endpoint.health.show-details=when_authorized

# Razorpay (placeholder keys; use env vars in prod)
payments.razorpay.key-id=rzp_test_xxxxxxxxxxxx
payments.razorpay.key-secret=xxxxxxxxxxxxxxxxxxxx
payments.razorpay.webhook.secret=change-this-webhook-secret

# App features
app.reservations.ttl-seconds=300
app.ratelimit.login.capacity=10
app.ratelimit.login.refill-per-minute=10

# Logging (JSON format recommended later; keeping default here)
logging.level.org.springframework=INFO
logging.level.com.example.ticketing=DEBUG
